<link rel="stylesheet" href="/index.css">
    <style>
      /* Hide Vite's internal error overlay */
      #vite-error-overlay, [id^="vite-error-overlay"] { display: none !important; }
    </style>
    <script>
      // Suppress annoying Vite HMR errors and Recharts layout warnings that are benign in this environment
      const suppressPatterns = [
        'WebSocket', 
        'vite', 
        'HMR', 
        'hot-reload', 
        'closed without opened',
        'width(-1)', 
        'height(-1)',
        'check the style of container'
      ];
      
      function shouldSuppress(msg) {
        if (!msg) return false;
        const str = String(msg);
        return suppressPatterns.some(p => str.toLowerCase().includes(p.toLowerCase()));
      }

      window.addEventListener('unhandledrejection', function(event) {
        if (shouldSuppress(event.reason) || shouldSuppress(event.reason?.message)) {
          event.stopImmediatePropagation();
          event.preventDefault();
        }
      }, true);

      window.addEventListener('error', function(event) {
        if (shouldSuppress(event.message) || shouldSuppress(event.error)) {
          event.stopImmediatePropagation();
          event.preventDefault();
        }
      }, true);

      // Wrap console.error and console.warn to silence specific messages
      const originalConsoleError = console.error;
      console.error = function() {
        if (arguments[0] && shouldSuppress(arguments[0])) return;
        originalConsoleError.apply(console, arguments);
      };

      const originalConsoleWarn = console.warn;
      console.warn = function() {
        if (arguments[0] && shouldSuppress(arguments[0])) return;
        originalConsoleWarn.apply(console, arguments);
      };
    </script>
</head>
